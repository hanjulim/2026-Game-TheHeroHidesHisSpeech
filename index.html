<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용사가 손가락을 숨김</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="left-panel">
    <canvas id="game-canvas"></canvas>
    <div id="hud-overlay">
      <div id="hp-display">HP: ❤️❤️❤️❤️❤️</div>
      <div id="score-display">SCORE: 0</div>
    </div>
    <div id="combo-display"></div>
    <div id="feedback-display"></div>
    <div id="stage-title-overlay">
      <div id="stage-title-text"></div>
      <div id="stage-narrative"></div>
      <div id="stage-start-hint">▶ SPACE 또는 아무 키나 눌러 시작</div>
    </div>
    <div id="dialog-box">
      <div id="dialog-speaker"></div>
      <div id="dialog-text"></div>
      <div id="dialog-gesture-hint"></div>
      <div id="dialog-continue">▼ 계속</div>
    </div>
    <div id="stage-clear-overlay">
      <div id="clear-title">STAGE CLEAR!</div>
      <div id="clear-skill"></div>
      <div id="clear-after"></div>
      <div id="clear-score"></div>
      <div id="clear-hint">▶ 아무 키나 눌러 계속</div>
    </div>
    <div id="gameover-overlay">
      <div id="gameover-title">GAME OVER</div>
      <div id="gameover-hint" style="font-size:12px;color:rgba(255,255,255,0.5);margin:16px 0 8px;">용사는 쓰러졌다...</div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button id="retry-btn" onclick="retryBattle()" style="font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 18px;background:transparent;border:2px solid #4ade80;color:#4ade80;cursor:pointer;">SPACE — 다시 싸우기</button>
        <button id="restart-btn" onclick="restartGame()" style="font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 18px;background:transparent;border:2px solid #888;color:#888;cursor:pointer;">R — 처음으로</button>
      </div>
    </div>
  </div>
  <div id="right-panel">
    <div id="webcam-section">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="landmark-canvas"></canvas>
      <div id="webcam-label">📷 CAMERA</div>
    </div>
    <div id="gesture-section">
      <div id="gesture-label">TARGET GESTURE</div>
      <div id="target-gesture-wrap">
        <canvas id="target-canvas" width="160" height="160"></canvas>
        <div id="gesture-name-text">-</div>
      </div>
      <div id="upcoming-wrap">
        <div id="upcoming-label">NEXT:</div>
        <canvas class="upcoming-canvas" id="up1" width="48" height="48"></canvas>
        <canvas class="upcoming-canvas" id="up2" width="48" height="48"></canvas>
        <canvas class="upcoming-canvas" id="up3" width="48" height="48"></canvas>
      </div>
      <div id="beat-bar-wrap">
        <div id="beat-bar-label">BEAT</div>
        <div id="beat-bar-bg"><div id="beat-bar-fill"></div></div>
      </div>
      <div id="gesture-detect-display">감지: -</div>
      <div id="keyboard-hint">키보드: A=✊ S=✋ D=☝️ F=✌️ G=👌 H=👍</div>
    </div>
  </div>
</div>

<!-- Mediapipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script type="module" src="js/main.js"></script>
</body>
</html>
